<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignFlow - Digital Signature Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 60px;
            max-width: 600px;
            text-align: center;
        }
        h1 { font-size: 2.5em; color: #667eea; margin-bottom: 20px; }
        p { font-size: 1.2em; color: #666; margin-bottom: 30px; line-height: 1.6; }
        .status { background: #e8f5e9; padding: 20px; border-radius: 10px; margin-top: 30px; }
        .status-ok { color: #2e7d32; font-weight: bold; font-size: 1.1em; }
        .api-info { margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 8px; font-size: 0.9em; color: #555; }
        #api-status { margin-top: 10px; font-size: 0.9em; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 SignFlow</h1>
        <p>Secure Digital Signature & Document Workflow Platform</p>
        <p>Multi-signer support • Audit trails • Encryption • Role-based access</p>
        
        <div class="status">
            <div class="status-ok">✓ Frontend Running</div>
            <div id="api-status">Checking backend...</div>
        </div>
        
        <div class="api-info">
            <strong>Status:</strong> Deployed on Coolify<br>
            <strong>Version:</strong> 1.0.0<br>
            <strong>Repository:</strong> github.com/samwiseuggit/signflow
        </div>
    </div>
    
    <script>
        // Check backend health
        fetch('/api/health')
            .then(res => res.json())
            .then(data => {
                document.getElementById('api-status').innerHTML = 
                    `<span style="color: #2e7d32;">✓ Backend API: ${data.service} v${data.version}</span>`;
            })
            .catch(err => {
                document.getElementById('api-status').innerHTML = 
                    '<span style="color: #d32f2f;">⚠ Backend API not reachable</span>';
            });
    </script>
</body>
</html>
